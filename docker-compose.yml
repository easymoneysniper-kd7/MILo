services:
  milo:
    build:
      context: .
      dockerfile: Dockerfile
    image: milo:cu128
    container_name: MILo
    working_dir: /workspace/MILo
    stdin_open: true
    tty: true
    shm_size: "16gb"
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
      TORCH_CUDA_ARCH_LIST: 12.0+PTX
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/workspace/MILo
